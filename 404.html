<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Artsy Whiz</title>
    <script>
      // GitHub Pages SPA redirect: encode the path into the query string
      // so the main index.html can restore it via history.replaceState
      var path = window.location.pathname;
      sessionStorage.setItem('spa-redirect', path);
      window.location.replace('/?r=1');
    </script>
  </head>
  <body></body>
</html>
